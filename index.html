
<!DOCTYPE html>

<head>

    <title>Infdev Mobile alpha Mobile 1.0.2</title>

            font-family: 'Minecraft';
            src: url('https://fonts.cdnfonts.com/css/minecraft-ia');
        }
        .minecraft-font {
            font-family: 'Minecraft', 'Courier New', Courier, monospace;
        }
