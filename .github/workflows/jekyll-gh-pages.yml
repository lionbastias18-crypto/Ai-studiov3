# Workflow adaptado para compilar TypeScript y desplegar en GitHub Pages
name: Deploy juego TypeScript

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Descargar código)
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias y Compilar Juego
        run: |
          npm install
          npm run build --if-present

      - name: Setup Pages (Sin Jekyll)
        uses: actions/configure-pages@v5
        with:
          enable_jekyll: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Si tu juego compila dentro de una carpeta específica (como 'dist' o 'build'),
          # cambia el punto '.' de abajo por el nombre de esa carpeta (ej. ./dist)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        
